manifest:
  defaults:
    revision: v0.3 # This defines the global revision
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware            
    - name: bildermankawasaki
      url-base: https://github.com/bildermankawasaki
    - name: urob
      url-base: https://github.com/urob
  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
    - name: zmk-keyboard-totem
      remote: bildermankawasaki
      revision: main
    - name: zmk-helpers
      remote: urob
      revision: main
  self:
    path: config
